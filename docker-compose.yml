services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - bot

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Paris
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build: .
    container_name: vinted-bot
    restart: unless-stopped
    depends_on:
      flaresolverr:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=10000
      - DASHBOARD_HOST=0.0.0.0
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - PUBLIC_URL=https://vintedlba.duckdns.org
      - WEBAPP_URL=https://vinted2.vercel.app
      - API_KEY=vinted_sk_a7f3e9b2c1d84f6e0123456789abcdef
      - PROXY_ENABLED=true
      - PROXY_LIST=http://pwgjvvnm:bkj8nncz2yst@31.59.20.176:6754,http://pwgjvvnm:bkj8nncz2yst@198.23.239.134:6540,http://pwgjvvnm:bkj8nncz2yst@45.38.107.97:6014,http://pwgjvvnm:bkj8nncz2yst@107.172.163.27:6543,http://pwgjvvnm:bkj8nncz2yst@198.105.121.200:6462,http://pwgjvvnm:bkj8nncz2yst@216.10.27.159:6837,http://pwgjvvnm:bkj8nncz2yst@142.111.67.146:5611,http://pwgjvvnm:bkj8nncz2yst@191.96.254.138:6185,http://pwgjvvnm:bkj8nncz2yst@31.58.9.4:6077,http://pwgjvvnm:bkj8nncz2yst@23.26.71.145:5628
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
      - bot-logs:/app/logs
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-logs:
  caddy-data:
  caddy-config:
