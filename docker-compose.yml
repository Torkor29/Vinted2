services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Paris
    mem_limit: 1g

  bot:
    build: .
    container_name: vinted-bot
    restart: unless-stopped
    depends_on:
      - flaresolverr
    ports:
      - "3000:10000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=10000
      - DASHBOARD_HOST=0.0.0.0
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
      - bot-logs:/app/logs
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-logs:
