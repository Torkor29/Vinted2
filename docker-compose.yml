services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - bot

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Paris
    mem_limit: 1g

  bot:
    build: .
    container_name: vinted-bot
    restart: unless-stopped
    depends_on:
      - flaresolverr
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=10000
      - DASHBOARD_HOST=0.0.0.0
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - PUBLIC_URL=https://vintedlba.duckdns.org
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
      - bot-logs:/app/logs
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-logs:
  caddy-data:
  caddy-config:
