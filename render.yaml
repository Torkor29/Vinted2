# render.yaml — Blueprint pour deploiement Render
# Deploie avec: https://render.com/deploy

databases:
  - name: vintedbot-db
    plan: starter # 7$/mois, 1GB storage
    databaseName: vintedbot
    user: vinted
    ipAllowList: []

  - name: vintedbot-redis
    plan: starter # 7$/mois
    type: redis
    ipAllowList: []

services:
  # Backend API + Bot + Workers (tout dans un seul process)
  - type: web
    name: vintedbot-backend
    plan: starter # 7$/mois — MINIMUM pour que ca tourne 24/7
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: vintedbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vintedbot-redis
          type: redis
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false # A remplir manuellement dans le dashboard
      - key: TELEGRAM_GROUP_ID
        sync: false
      - key: WEBAPP_URL
        sync: false # URL de la static site une fois deployee
      - key: PROXY_LIST
        sync: false
      - key: VINTED_DOMAIN
        value: www.vinted.fr
      - key: DEFAULT_SCAN_INTERVAL
        value: "5" # Un peu plus lent sur Render, moins de RAM
      - key: LOG_LEVEL
        value: info

  # Mini App React (Static Site — GRATUIT)
  - type: web
    name: vintedbot-webapp
    runtime: static
    buildCommand: cd webapp && npm install && npm run build
    staticPublishPath: webapp/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
